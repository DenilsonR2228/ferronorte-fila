<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino — Academia + Corrida</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede9;
  --txt:#1a1a1a;--txt2:#6b6b6b;--txt3:#9b9b9b;
  --border:#e0e0dc;--border2:#c8c8c4;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-txt:#0C447C;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-txt:#085041;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-txt:#854F0B;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-txt:#791F1F;
  --purple:#5B3E9E;--purple-bg:#EFEAFB;--purple-txt:#402A73;
  --chart-blue:#185FA5;--chart-aqua:#0f9d6b;
  --seq-100:#cde2fb;--seq-300:#6da7ec;--seq-450:#2a78d6;--seq-600:#184f95;
  --radius:8px;--radius-lg:12px;
}
body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--txt);min-height:100vh;padding-bottom:40px}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:10}
.topbar-logo{font-size:13px;font-weight:600;letter-spacing:0.02em}
.topbar-logo span{color:var(--txt2);font-weight:400}
.content{max-width:760px;margin:0 auto;padding:1.25rem 1.25rem 0}

.week-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:480px){.week-summary{grid-template-columns:repeat(2,1fr)}}
.sum-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.sum-num{font-size:20px;font-weight:600}
.sum-label{font-size:11px;color:var(--txt2);margin-top:2px}

.view-toggle{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;gap:2px;margin-bottom:1rem}
.view-btn{flex:1;text-align:center;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--txt2);border-radius:var(--radius);cursor:pointer;user-select:none}
.view-btn.active{background:var(--txt);color:#fff}

.dash-section{margin-bottom:20px}
.dash-title{font-size:13px;font-weight:600;margin-bottom:2px}
.dash-sub{font-size:11.5px;color:var(--txt2);margin-bottom:10px}
.dash-empty{text-align:center;padding:2rem 1rem;color:var(--txt2);font-size:12.5px}

.chart-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px 12px}
.chart-legend{display:flex;gap:16px;margin-bottom:14px;font-size:11.5px;color:var(--txt2)}
.legend-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}

.bars-row{display:flex;align-items:flex-end;gap:10px;height:110px;border-bottom:1px solid var(--border2);padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;min-width:0}
.bar-group{display:flex;align-items:flex-end;gap:2px;height:100%;width:100%;justify-content:center}
.bar-subcol{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:100%;max-width:22px;border-radius:4px 4px 0 0;background:var(--chart-blue);min-height:2px}
.bar.aqua{background:var(--chart-aqua)}
.bar-col:active .bar{opacity:0.75}
.bar-value{font-size:9.5px;color:var(--txt2);margin-bottom:3px;white-space:nowrap;font-weight:600}
.bar-axis{display:flex;gap:10px;padding:0 2px;margin-top:6px}
.bar-axis-label{flex:1;text-align:center;font-size:10px;color:var(--txt2);white-space:nowrap;min-width:0}
.bar-axis-label.current{color:var(--txt);font-weight:700}

.heat-wrap{overflow-x:auto}
.heat-grid{display:inline-grid;grid-auto-rows:22px;gap:3px;margin-top:4px}
.heat-cell{width:22px;height:22px;border-radius:4px;background:var(--bg2);cursor:pointer}
.heat-row-label{font-size:10px;color:var(--txt2);display:flex;align-items:center;padding-right:6px}
.heat-col-label{font-size:9.5px;color:var(--txt2);text-align:center}

.edit-day{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden}
.edit-day summary{padding:13px 15px;cursor:pointer;font-weight:600;font-size:13.5px;list-style:none;display:flex;align-items:baseline;gap:8px}
.edit-day summary::-webkit-details-marker{display:none}
.edit-day summary::before{content:"▸";color:var(--txt3);font-size:11px;transition:transform .15s}
.edit-day[open] summary::before{transform:rotate(90deg)}
.edit-day-sub{font-weight:400;color:var(--txt2);font-size:11.5px}
.edit-day-body{padding:0 15px 15px}
.edit-block-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 8px}
.edit-ex-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--bg2);border-radius:var(--radius);padding:8px}
.edit-icon-select{font-size:10px;max-width:78px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px;background:var(--bg)}
.edit-icon-preview{width:32px;height:32px;flex-shrink:0;background:var(--bg);border-radius:var(--radius);padding:4px;border:0.5px solid var(--border)}
.edit-ex-fields{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.edit-ex-fields input{border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 8px;font-size:12.5px;background:var(--bg);color:var(--txt);width:100%}
.edit-remove-btn{background:none;border:none;color:var(--red);font-size:15px;cursor:pointer;padding:4px 6px;flex-shrink:0}
.edit-add-btn{margin-top:2px}
.edit-corrida-row{background:var(--bg2);border-radius:var(--radius);padding:10px;margin-top:8px}
.edit-corrida-row label{font-size:10.5px;color:var(--txt2);display:block;margin-bottom:3px;margin-top:8px}
.edit-corrida-row label:first-child{margin-top:0}
.edit-corrida-row input,.edit-corrida-row textarea{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 9px;font-size:12.5px;background:var(--bg);color:var(--txt);font-family:inherit;resize:vertical}

.tabs{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;gap:2px;overflow-x:auto;margin-bottom:1rem}
.tab{padding:9px 12px;cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);white-space:nowrap;user-select:none;border-radius:var(--radius);text-align:center;flex:1;position:relative}
.tab.active{color:#fff;background:var(--txt)}
.tab .tag{display:block;font-size:9px;margin-top:2px;opacity:0.7}
.tab.done::after{content:"✓";position:absolute;top:2px;right:4px;font-size:9px;color:var(--green)}
.tab.active.done::after{color:#9ee8cf}

.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.day-title{font-size:17px;font-weight:600}
.day-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.02em}
.badge-blue{background:var(--blue-bg);color:var(--blue-txt)}
.badge-green{background:var(--green-bg);color:var(--green-txt)}
.badge-purple{background:var(--purple-bg);color:var(--purple-txt)}
.badge-amber{background:var(--amber-bg);color:var(--amber-txt)}

.progress-bar{height:6px;background:var(--bg2);border-radius:6px;overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:var(--green);transition:width .2s}

.block{margin-bottom:16px}
.block-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}

.ex-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:opacity .15s,background .15s}
.ex-card.checked{background:var(--green-bg);border-color:var(--green)}
.ex-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:all .15s;user-select:none}
.ex-check.on{background:var(--green);border-color:var(--green)}
.ex-icon{width:46px;height:46px;flex-shrink:0;background:var(--bg2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;padding:5px;cursor:pointer}
.ex-icon-svg{width:100%;height:100%;overflow:visible}
.ex-icon-svg .ic-line{fill:none;stroke:var(--txt);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
.ex-icon-svg .ic-head{fill:none;stroke:var(--txt);stroke-width:4}
.ex-icon-svg .ic-floor{stroke:var(--border2);stroke-width:2.5;stroke-linecap:round}
.ex-icon-svg .ic-accent{stroke:var(--blue);stroke-width:4;fill:none;stroke-linecap:round}
.ex-icon-svg .ic-dot{fill:var(--blue);stroke:none}
.ex-card.checked .ex-icon{background:var(--green-bg)}
.ex-card.checked .ex-icon-svg .ic-line,.ex-card.checked .ex-icon-svg .ic-head{stroke:var(--green-txt)}
.ex-card.checked .ex-icon-svg .ic-dot{fill:var(--green-txt)}
.ex-body{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:13px}
.ex-meta{font-size:11.5px;color:var(--txt2);margin-top:2px}
.ex-card.checked .ex-name{text-decoration:line-through;color:var(--txt2)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);padding:20px;max-width:280px;width:100%;text-align:center}
.modal-box .ex-icon-svg{width:140px;height:140px}
.modal-box .modal-name{font-weight:600;font-size:15px;margin-top:8px}
.modal-box .modal-meta{font-size:12px;color:var(--txt2);margin-top:4px}

.run-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px}
.run-card .ex-meta{margin-top:6px;line-height:1.5}

.rest-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;text-align:center;margin-top:10px}
.rest-time{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;margin:6px 0}
.rest-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn-sec{background:var(--bg);color:var(--txt);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.1s}
.btn-sec:hover{background:var(--bg2)}
.btn-sec.active-timer{background:var(--txt);color:#fff;border-color:var(--txt)}

.rest-day{text-align:center;padding:3rem 1rem;color:var(--txt2)}
.rest-day-icon{font-size:34px;margin-bottom:10px}

.reset-row{text-align:center;margin-top:22px}
.link-btn{background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Meu Treino <span>— Academia + Corrida</span></div>
  <div class="topbar-logo" id="semanaLabel" style="font-weight:400;color:var(--txt2)"></div>
</div>

<div class="content">

  <div class="week-summary">
    <div class="sum-card"><div class="sum-num" id="sumAcademia">0/5</div><div class="sum-label">Academia</div></div>
    <div class="sum-card"><div class="sum-num" id="sumCorrida">0/4</div><div class="sum-label">Corrida</div></div>
    <div class="sum-card"><div class="sum-num" id="sumExercicios">0/0</div><div class="sum-label">Exercícios</div></div>
    <div class="sum-card"><div class="sum-num" id="sumStreak">0</div><div class="sum-label">Dias em dia</div></div>
  </div>

  <div class="view-toggle">
    <div class="view-btn active" id="viewBtnSemana" onclick="selecionarView('semana')">Meu treino</div>
    <div class="view-btn" id="viewBtnDashboard" onclick="selecionarView('dashboard')">Dashboard</div>
    <div class="view-btn" id="viewBtnEditor" onclick="selecionarView('editor')">Editar</div>
  </div>

  <div id="semanaView">
    <div class="tabs" id="tabs"></div>

    <div id="dayView"></div>

    <div class="reset-row">
      <button class="link-btn" onclick="resetarSemana()">Reiniciar progresso desta semana</button>
    </div>
  </div>

  <div id="dashboardView" style="display:none"></div>

  <div id="editorView" style="display:none"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="fecharIlustracao(event)">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
// ---------- Plano semanal ----------
// 5x academia (força + pernas em foco), 4x corrida.
// Terça e Quarta combinam academia + corrida leve no mesmo dia.
const PLANO = [

    ]},
  { id:"sab", nome:"Sábado", tipo:["academia","corrida"], titulo:"Full Body Funcional + Corrida leve",

      { titulo:"Musculação (circuito, 3 voltas)", exercicios:[
        {id:"kbswing", n:"Kettlebell swing", m:"15 reps", icon:"kbswing"},
        {id:"burpee", n:"Burpee", m:"12 reps", icon:"burpee"},
        {id:"mountainclimber", n:"Mountain climber", m:"20 reps", icon:"mountainclimber"},
        {id:"sideplank", n:"Prancha lateral", m:"30s cada lado", icon:"sideplank"},
      ]},
      { titulo:"Corrida", corrida:{id:"corrida_sab", tipo:"Leve / moderada", detalhe:"25-30 min em ritmo moderado, sem forçar. Serve de complemento ao circuito funcional."} }
    ]},
  { id:"dom", nome:"Domingo", tipo:["corrida"], titulo:"Corrida Longa",
    blocos:[

    ]},
];

// ---------- Estado / persistência ----------
function getISOWeekKey(d=new Date()){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1)/7);
  return `${date.getUTCFullYear()}-W${weekNo}`;
}

const STORAGE_KEY = "treino_progresso";
function carregarProgresso(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
}
function salvarProgresso(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

function chaveExercicio(diaId, blocoIdx, exIdx){ return `${diaId}_${blocoIdx}_${exIdx}`; }

// ---------- Edições do plano (nome, séries, ícone, novos exercícios, remoções) ----------
const EDITS_KEY = "treino_plano_edits";
function carregarEdits(){
  try{
    const e = JSON.parse(localStorage.getItem(EDITS_KEY)) || {};
    return { overrides: e.overrides || {}, extras: e.extras || {} };
  }catch(err){ return { overrides:{}, extras:{} }; }
}
function salvarEdits(){ localStorage.setItem(EDITS_KEY, JSON.stringify(edits)); }
let edits = carregarEdits();

function extrasKey(diaId, blocoIdx){ return `${diaId}__${blocoIdx}`; }
function getExtras(diaId, blocoIdx){ return edits.extras[extrasKey(diaId, blocoIdx)] || []; }

function efetivoExercicios(dia, blocoIdx, bloco){
  const seed = bloco.exercicios.map(e => ({...e, ...(edits.overrides[e.id] || {})}));
  const extras = getExtras(dia.id, blocoIdx).map(e => ({...e, ...(edits.overrides[e.id] || {})}));
  return [...seed, ...extras];
}
function efetivoCorrida(bloco){
  return {...bloco.corrida, ...(edits.overrides[bloco.corrida.id] || {})};
}
function escapeAttr(s){
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

let diaSelecionado = (() => {

  return PLANO[hojeIdx].id;
})();

// ---------- Timer de descanso ----------
let timerInterval = null;
let timerSegundos = 90;
let timerRestante = 90;

function renderTimer(){
  return `
    <div class="rest-box">
      <div class="block-title">⏱ Cronômetro de descanso</div>
      <div class="rest-time" id="restTime">${formatTime(timerRestante)}</div>
      <div class="rest-actions">
        <button class="btn-sec" onclick="ajustarTimer(60)">60s</button>
        <button class="btn-sec" onclick="ajustarTimer(90)">90s</button>
        <button class="btn-sec" onclick="ajustarTimer(120)">120s</button>
        <button class="btn-sec" id="btnStartTimer" onclick="toggleTimer()">Iniciar</button>
        <button class="btn-sec" onclick="resetarTimer()">Zerar</button>
      </div>
    </div>`;
}
function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,"0");
  const sec = (s%60).toString().padStart(2,"0");
  return `${m}:${sec}`;
}
function ajustarTimer(v){
  clearInterval(timerInterval); timerInterval=null;
  timerSegundos = v; timerRestante = v;
  const el = document.getElementById("restTime"); if(el) el.textContent = formatTime(timerRestante);
  const btn = document.getElementById("btnStartTimer"); if(btn){ btn.textContent="Iniciar"; btn.classList.remove("active-timer"); }
}
function resetarTimer(){ ajustarTimer(timerSegundos); }
function toggleTimer(){
  const btn = document.getElementById("btnStartTimer");
  if(timerInterval){
    clearInterval(timerInterval); timerInterval=null;
    btn.textContent="Iniciar"; btn.classList.remove("active-timer");
    return;
  }
  btn.textContent="Pausar"; btn.classList.add("active-timer");
  timerInterval = setInterval(() => {
    timerRestante--;
    const el = document.getElementById("restTime");
    if(el) el.textContent = formatTime(timerRestante);
    if(timerRestante <= 0){
      clearInterval(timerInterval); timerInterval=null;
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      const b = document.getElementById("btnStartTimer");
      if(b){ b.textContent="Iniciar"; b.classList.remove("active-timer"); }
      timerRestante = timerSegundos;
    }
  }, 1000);
}

// ---------- Render ----------
function badgeTipo(tipo){
  if(tipo.includes("academia") && tipo.includes("corrida")) return `<span class="badge badge-purple">Academia + Corrida</span>`;
  if(tipo.includes("academia")) return `<span class="badge badge-blue">Academia</span>`;
  return `<span class="badge badge-green">Corrida</span>`;
}

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = PLANO.map(dia => {
    const completo = diaCompleto(dia);
    return `<div class="tab ${dia.id===diaSelecionado?'active':''} ${completo?'done':''}" onclick="selecionarDia('${dia.id}')">
      ${dia.nome}<span class="tag">${dia.tipo.includes('academia')&&dia.tipo.includes('corrida')?'🏋️🏃':dia.tipo.includes('academia')?'🏋️':'🏃'}</span>
    </div>`;
  }).join("");
}

function totalExerciciosDia(dia){
  return dia.blocos.reduce((acc,b,bi) => {
    let n = 0;
    if(b.exercicios) n += efetivoExercicios(dia, bi, b).filter(e => !e.oculto).length;
    if(b.corrida) n += 1;
    return acc + n;
  }, 0);
}
function feitosExerciciosDia(dia, weekKey=semanaAtual){
  const p = (progresso[weekKey] && progresso[weekKey][dia.id]) || {};
  let count = 0;
  dia.blocos.forEach((b, bi) => {
    if(b.exercicios){
      efetivoExercicios(dia, bi, b).forEach((ex, ei) => {
        if(ex.oculto) return;
        if(p[chaveExercicio(dia.id,bi,ei)]) count++;
      });
    }
    if(b.corrida) if(p[chaveExercicio(dia.id,bi,'corrida')]) count++;
  });
  return count;
}
function diaCompleto(dia, weekKey=semanaAtual){
  const total = totalExerciciosDia(dia);
  return total>0 && feitosExerciciosDia(dia, weekKey)===total;
}

function selecionarDia(id){
  diaSelecionado = id;
  renderTudo();
}

function toggleExercicio(diaId, blocoIdx, exIdx){
  const p = progresso[semanaAtual];
  if(!p[diaId]) p[diaId] = {};
  const k = chaveExercicio(diaId, blocoIdx, exIdx);
  p[diaId][k] = !p[diaId][k];
  salvarProgresso(progresso);
  renderTudo();
}

function renderDia(){
  const dia = PLANO.find(d => d.id === diaSelecionado);
  const p = progresso[semanaAtual][dia.id] || {};
  const total = totalExerciciosDia(dia);
  const feitos = feitosExerciciosDia(dia);
  const pct = total ? Math.round((feitos/total)*100) : 0;

  let html = `
    <div class="day-header">
      <div>
        <div class="day-title">${dia.titulo}</div>
        <div class="day-sub">${dia.nome} · ${feitos}/${total} concluído${total===1?'':'s'}</div>
      </div>
      ${badgeTipo(dia.tipo)}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;

  dia.blocos.forEach((bloco, bi) => {
    html += `<div class="block"><div class="block-title">${bloco.titulo}</div>`;
    if(bloco.exercicios){
      efetivoExercicios(dia, bi, bloco).forEach((ex, ei) => {
        if(ex.oculto) return;
        const k = chaveExercicio(dia.id, bi, ei);
        const on = !!p[k];
        html += `
          <div class="ex-card ${on?'checked':''}">
            <div class="ex-check ${on?'on':''}" onclick="toggleExercicio('${dia.id}',${bi},${ei})">${on?'✓':''}</div>
            ${iconSvg(ex.icon, ex.n, ex.m)}
            <div class="ex-body">
              <div class="ex-name">${ex.n}</div>
              <div class="ex-meta">${ex.m}</div>
            </div>
          </div>`;
      });
    }
    if(bloco.corrida){
      const corrida = efetivoCorrida(bloco);
      const k = chaveExercicio(dia.id, bi, 'corrida');
      const on = !!p[k];
      html += `
        <div class="run-card">
          <div class="ex-card ${on?'checked':''}" style="border:none;padding:0;margin:0;background:transparent">
            <div class="ex-check ${on?'on':''}" onclick="toggleExercicio('${dia.id}',${bi},'corrida')">${on?'✓':''}</div>
            ${iconSvg('run', corrida.tipo, corrida.detalhe)}
            <div class="ex-body">
              <div class="ex-name">${corrida.tipo}</div>
              <div class="ex-meta">${corrida.detalhe}</div>
            </div>
          </div>
        </div>`;
    }
    html += `</div>`;
  });

  if(dia.tipo.includes("academia")){
    html += renderTimer();
  }

  document.getElementById("dayView").innerHTML = html;
}

function renderResumo(){
  let academiaFeitos = 0, corridaFeitos = 0, exTotal = 0, exFeitos = 0;
  PLANO.forEach(dia => {
    const completo = diaCompleto(dia);
    if(dia.tipo.includes("academia") && completo) academiaFeitos++;
    if(dia.tipo.includes("corrida") && completo) corridaFeitos++;
    exTotal += totalExerciciosDia(dia);
    exFeitos += feitosExerciciosDia(dia);
  });
  document.getElementById("sumAcademia").textContent = `${academiaFeitos}/5`;
  document.getElementById("sumCorrida").textContent = `${corridaFeitos}/4`;
  document.getElementById("sumExercicios").textContent = `${exFeitos}/${exTotal}`;
  document.getElementById("sumStreak").textContent = PLANO.filter(diaCompleto).length;
}

function renderTudo(){
  renderTabs();
  renderDia();
  renderResumo();
  if(viewMode === "dashboard") renderDashboard();
}

function resetarSemana(){
  if(!confirm("Reiniciar todo o progresso desta semana?")) return;
  progresso[semanaAtual] = {};
  salvarProgresso(progresso);
  renderTudo();
}

function compareWeekKeys(a, b){
  const [ay, aw] = a.split("-W").map(Number);
  const [by, bw] = b.split("-W").map(Number);
  return ay - by || aw - bw;
}
function allWeekKeysOrdenadas(){
  return Object.keys(progresso).sort(compareWeekKeys);
}
function mondayOfISOWeek(weekKey){
  const [yearStr, weekStr] = weekKey.split("-W");
  const year = Number(yearStr), week = Number(weekStr);
  const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
  const dow = simple.getUTCDay() || 7;
  simple.setUTCDate(simple.getUTCDate() - dow + 1);
  return simple;
}
const MESES_ABREV = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function weekLabel(weekKey){ return "S" + weekKey.split("-W")[1]; }
function monthKeyFromWeek(weekKey){
  const d = mondayOfISOWeek(weekKey);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}`;
}
function monthLabel(monthKey){
  const [y, m] = monthKey.split("-").map(Number);
  return `${MESES_ABREV[m - 1]}/${String(y).slice(2)}`;
}
function formatDataCurta(d){
  return `${String(d.getUTCDate()).padStart(2,"0")}/${String(d.getUTCMonth()+1).padStart(2,"0")}`;
}

function statsForWeek(weekKey){
  let academia = 0, corrida = 0, diasCompletos = 0, exFeitos = 0, exTotal = 0;
  PLANO.forEach(dia => {
    const completo = diaCompleto(dia, weekKey);
    if(completo) diasCompletos++;
    if(dia.tipo.includes("academia") && completo) academia++;
    if(dia.tipo.includes("corrida") && completo) corrida++;
    exTotal += totalExerciciosDia(dia);
    exFeitos += feitosExerciciosDia(dia, weekKey);
  });
  return {
    weekKey, academia, corrida, diasCompletos, exFeitos, exTotal,
    pctDias: Math.round((diasCompletos / 7) * 100),
  };
}

function corSequencial(pct){
  if(pct <= 0) return "var(--bg2)";
  if(pct < 50) return "var(--seq-100)";
  if(pct < 100) return "var(--seq-450)";
  return "var(--seq-600)";
}

function abrirDetalheSemana(weekKey){
  const s = statsForWeek(weekKey);
  const monday = mondayOfISOWeek(weekKey);
  const sunday = new Date(monday); sunday.setUTCDate(sunday.getUTCDate() + 6);
  document.getElementById("modalBox").innerHTML = `
    <div class="modal-name">Semana ${weekKey.split("-W")[1]}</div>

  document.getElementById("modalOverlay").classList.add("open");
}

function abrirDetalheMes(monthKey){
  const weeksDoMes = allWeekKeysOrdenadas().filter(wk => monthKeyFromWeek(wk) === monthKey);
  let academia = 0, corrida = 0, exFeitos = 0, exTotal = 0;
  weeksDoMes.forEach(wk => {
    const s = statsForWeek(wk);
    academia += s.academia; corrida += s.corrida; exFeitos += s.exFeitos; exTotal += s.exTotal;
  });
  document.getElementById("modalBox").innerHTML = `
    <div class="modal-name">${monthLabel(monthKey)}</div>
    <div class="modal-meta">${weeksDoMes.length} semana${weeksDoMes.length === 1 ? "" : "s"} registrada${weeksDoMes.length === 1 ? "" : "s"}</div>
    <div style="text-align:left;margin-top:14px;font-size:12.5px;line-height:2">
      <div>🏋️ Academia: <strong>${academia}</strong> / ${weeksDoMes.length * 5} dias possíveis</div>
      <div>🏃 Corrida: <strong>${corrida}</strong> / ${weeksDoMes.length * 4} dias possíveis</div>
      <div>✅ Exercícios: <strong>${exFeitos}/${exTotal}</strong></div>
    </div>
  `;
  document.getElementById("modalOverlay").classList.add("open");
}

function renderDashboard(){
  const el = document.getElementById("dashboardView");
  const semanas = allWeekKeysOrdenadas();
  if(semanas.length === 0){
    el.innerHTML = `<div class="dash-empty">Ainda sem histórico. Marque alguns exercícios na aba "Meu treino" pra começar a ver seus resultados aqui.</div>`;
    return;
  }

  const ultimasSemanas = semanas.slice(-8);
  const barsSemanasHtml = ultimasSemanas.map(wk => {
    const s = statsForWeek(wk);
    return `<div class="bar-col" onclick="abrirDetalheSemana('${wk}')">
      <div class="bar-value">${s.pctDias}%</div>
      <div class="bar" style="height:${Math.max(s.pctDias, 3)}%"></div>
    </div>`;
  }).join("");
  const axisSemanasHtml = ultimasSemanas.map(wk =>
    `<div class="bar-axis-label ${wk === semanaAtual ? "current" : ""}">${weekLabel(wk)}</div>`
  ).join("");

  const meses = [...new Set(semanas.map(monthKeyFromWeek))].sort();
  const ultimosMeses = meses.slice(-6);
  const barsMesesHtml = ultimosMeses.map(mk => {
    const weeksDoMes = semanas.filter(wk => monthKeyFromWeek(wk) === mk);
    let academia = 0, corrida = 0;
    weeksDoMes.forEach(wk => { const s = statsForWeek(wk); academia += s.academia; corrida += s.corrida; });
    const pctAcademia = Math.round((academia / (weeksDoMes.length * 5)) * 100);
    const pctCorrida = Math.round((corrida / (weeksDoMes.length * 4)) * 100);
    return `<div class="bar-col" onclick="abrirDetalheMes('${mk}')">
      <div class="bar-group">
        <div class="bar-subcol"><div class="bar-value">${pctAcademia}%</div><div class="bar" style="height:${Math.max(pctAcademia, 3)}%"></div></div>
        <div class="bar-subcol"><div class="bar-value">${pctCorrida}%</div><div class="bar aqua" style="height:${Math.max(pctCorrida, 3)}%"></div></div>
      </div>
    </div>`;
  }).join("");
  const axisMesesHtml = ultimosMeses.map(mk => `<div class="bar-axis-label">${monthLabel(mk)}</div>`).join("");

  const ultimasSemanasHeat = semanas.slice(-8);
  const diasAbrev = ["Sg","Te","Qa","Qi","Sx","Sb","Do"];
  const headerCells = `<div class="heat-row-label"></div>` + diasAbrev.map(d => `<div class="heat-col-label">${d}</div>`).join("");
  const heatRows = ultimasSemanasHeat.map(wk => {
    const rowLabel = `<div class="heat-row-label">${weekLabel(wk)}</div>`;
    const cells = PLANO.map(dia => {
      const total = totalExerciciosDia(dia);
      const feitos = feitosExerciciosDia(dia, wk);
      const pct = total ? Math.round((feitos / total) * 100) : 0;
      return `<div class="heat-cell" style="background:${corSequencial(pct)}" onclick="abrirDetalheCelula('${wk}','${dia.id}')"></div>`;
    }).join("");
    return rowLabel + cells;
  }).join("");

  el.innerHTML = `
    <div class="dash-section">
      <div class="dash-title">Últimas semanas</div>
      <div class="dash-sub">% de dias do plano concluídos por semana — toque numa barra pra ver detalhes</div>
      <div class="chart-box">
        <div class="bars-row">${barsSemanasHtml}</div>
        <div class="bar-axis">${axisSemanasHtml}</div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-title">Resultados por mês</div>
      <div class="dash-sub">% de dias concluídos, academia vs. corrida — toque numa barra pra ver detalhes</div>
      <div class="chart-box">
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--chart-blue)"></span>Academia</span>
          <span><span class="legend-dot" style="background:var(--chart-aqua)"></span>Corrida</span>
        </div>
        <div class="bars-row">${barsMesesHtml}</div>
        <div class="bar-axis">${axisMesesHtml}</div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-title">Visão geral</div>
      <div class="dash-sub">Intensidade de conclusão por dia — toque numa célula pra ver detalhes</div>
      <div class="chart-box heat-wrap">
        <div class="heat-grid" style="grid-template-columns:44px repeat(7,22px)">${headerCells}${heatRows}</div>
      </div>
    </div>
  `;
}

// ---------- Editor do plano ----------
function iconOptionsHtml(selecionado){
  return Object.keys(ICONS).filter(k => k !== "run").sort((a,b) => ICON_LABELS[a].localeCompare(ICON_LABELS[b])).map(k =>
    `<option value="${k}" ${k===selecionado?"selected":""}>${ICON_LABELS[k]}</option>`
  ).join("");
}

function renderEditor(){
  const el = document.getElementById("editorView");
  const abertos = new Set([...el.querySelectorAll(".edit-day[open]")].map(d => d.dataset.dia));
  el.innerHTML = PLANO.map(dia => {
    let blocosHtml = "";
    dia.blocos.forEach((bloco, bi) => {
      blocosHtml += `<div class="edit-block-title">${bloco.titulo}</div>`;
      if(bloco.exercicios){
        efetivoExercicios(dia, bi, bloco).forEach((ex, ei) => {
          if(ex.oculto) return;
          blocosHtml += `
            <div class="edit-ex-row">
              <div class="edit-icon-preview"><svg viewBox="0 0 64 64" class="ex-icon-svg" id="prev_${dia.id}_${bi}_${ei}">${ICONS[ex.icon] || ""}</svg></div>
              <select class="edit-icon-select" onchange="editarExercicio('${ex.id}','icon',this.value); document.getElementById('prev_${dia.id}_${bi}_${ei}').innerHTML = ICONS[this.value] || '';">
                ${iconOptionsHtml(ex.icon)}
              </select>
              <div class="edit-ex-fields">
                <input type="text" value="${escapeAttr(ex.n)}" placeholder="Nome do exercício" oninput="editarExercicio('${ex.id}','n',this.value)">
                <input type="text" value="${escapeAttr(ex.m)}" placeholder="Séries x repetições" oninput="editarExercicio('${ex.id}','m',this.value)">
              </div>
              <button class="edit-remove-btn" onclick="removerExercicio('${ex.id}')" title="Remover">✕</button>
            </div>`;
        });
        blocosHtml += `<button class="btn-sec edit-add-btn" onclick="adicionarExercicio('${dia.id}',${bi})">+ Adicionar exercício</button>`;
      }
      if(bloco.corrida){
        const c = efetivoCorrida(bloco);
        blocosHtml += `
          <div class="edit-corrida-row">
            <label>Tipo de treino</label>
            <input type="text" value="${escapeAttr(c.tipo)}" oninput="editarCorrida('${c.id}','tipo',this.value)">
            <label>Detalhes</label>
            <textarea rows="3" oninput="editarCorrida('${c.id}','detalhe',this.value)">${escapeAttr(c.detalhe)}</textarea>
          </div>`;
      }
    });
    return `
      <details class="edit-day" data-dia="${dia.id}" ${abertos.has(dia.id) ? "open" : ""}>
        <summary>${dia.nome} <span class="edit-day-sub">${dia.titulo}</span></summary>
        <div class="edit-day-body">${blocosHtml}</div>
      </details>`;
  }).join("");
}

function editarExercicio(id, campo, valor){
  if(!edits.overrides[id]) edits.overrides[id] = {};
  edits.overrides[id][campo] = valor;
  salvarEdits();
}

function removerExercicio(id){
  if(!confirm("Remover este exercício do plano?")) return;
  if(!edits.overrides[id]) edits.overrides[id] = {};
  edits.overrides[id].oculto = true;
  salvarEdits();
  renderEditor();
}

function adicionarExercicio(diaId, blocoIdx){
  const key = extrasKey(diaId, blocoIdx);
  if(!edits.extras[key]) edits.extras[key] = [];
  const novoId = "extra_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  edits.extras[key].push({ id: novoId, n: "Novo exercício", m: "3x10", icon: "plank" });
  salvarEdits();
  renderEditor();
}

function editarCorrida(id, campo, valor){
  if(!edits.overrides[id]) edits.overrides[id] = {};
  edits.overrides[id][campo] = valor;
  salvarEdits();
}

renderTudo();
</script>
</body>
</html>
